<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q5M.js + Next.js: Quantum Entanglement</title>
<!-- SPDX-License-Identifier: MIT -->
<!-- SPDX-FileCopyrightText: Copyright 2025 OpenQL Project -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../../../../dist/q5m.min.js"></script>
    <script>
        // Fallback to CDN if local file fails to load
        if (typeof Q5M === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/q5m@latest/dist/q5m.min.js';
            document.head.appendChild(script);
        }
    </script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 25%, #0070f3 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 4px 24px rgba(0, 112, 243, 0.1);
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        button {
            background: linear-gradient(45deg, #0070f3, #0051a2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 112, 243, 0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 112, 243, 0.3);
        }
        button.active {
            background: linear-gradient(45deg, #ff4757, #c44569);
            box-shadow: 0 2px 8px rgba(255, 71, 87, 0.3);
        }
        .state-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .probabilities {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 12px;
        }
        .probability-bar {
            text-align: center;
        }
        .bar {
            background: linear-gradient(to top, #0070f3, #5bc0de);
            border-radius: 4px;
            transition: height 0.3s ease;
            margin: 8px 0;
            min-height: 4px;
        }
        .state-info {
            background: rgba(0,0,0,0.4);
            padding: 16px;
            border-radius: 8px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            border-left: 4px solid #0070f3;
        }
        .amplitude-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .amplitude {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .complex-num {
            color: #5bc0de;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
        }
        .nextjs-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 112, 243, 0.2);
            border: 1px solid rgba(0, 112, 243, 0.4);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 600;
            color: #0070f3;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { createRoot } = ReactDOM;

        const EntanglementDemo = () => {
            // State management (Next.js style with React hooks)
            const [circuit, setCircuit] = useState(null);
            const [quantumState, setQuantumState] = useState(null);
            const [currentState, setCurrentState] = useState('reset');
            const [numQubits, setNumQubits] = useState(3);

            // Initialize quantum circuit
            const initCircuit = useCallback(() => {
                if (typeof Q5M !== 'undefined') {
                    const newCircuit = new Q5M.Circuit(numQubits);
                    setCircuit(newCircuit);
                    executeCircuit(newCircuit);
                }
            }, [numQubits]);

            // Execute circuit and get quantum state
            const executeCircuit = (circuitToExecute) => {
                try {
                    const result = circuitToExecute.execute();
                    setQuantumState(result.state);
                } catch (error) {
                    console.error('Circuit execution error:', error);
                }
            };

            // Computed values
            const probabilities = quantumState ? quantumState.probabilities() : [];
            
            const amplitudes = quantumState ? 
                quantumState.amplitudes().map(amp => {
                    if (!amp) return { re: 0, im: 0 };
                    return amp;
                }) : [];

            const getStateDescription = () => {
                switch (currentState) {
                    case 'bell':
                        return 'Bell State |Φ⁺⟩ = (|00⟩ + |11⟩)/√2 - Maximally entangled 2-qubit state';
                    case 'bell-':
                        return 'Bell State |Φ⁻⟩ = (|00⟩ - |11⟩)/√2 - Maximally entangled with phase';
                    case 'ghz':
                        return 'GHZ State = (|000⟩ + |111⟩)/√2 - 3-qubit entangled state';
                    case 'w':
                        return 'W State = (|001⟩ + |010⟩ + |100⟩)/√3 - Symmetric 3-qubit state';
                    case 'reset':
                        return 'Ground State |000⟩ - No entanglement';
                    default:
                        return 'Custom quantum state';
                }
            };

            const getEntanglementInfo = () => {
                switch (currentState) {
                    case 'bell':
                    case 'bell-':
                        return 'Maximally entangled (2 qubits)';
                    case 'ghz':
                        return 'Maximal 3-qubit entanglement';
                    case 'w':
                        return 'Partial 3-qubit entanglement';
                    case 'reset':
                        return 'No entanglement (separable state)';
                    default:
                        return 'Analysis required';
                }
            };

            const getSchmidtRank = () => {
                switch (currentState) {
                    case 'bell':
                    case 'bell-':
                    case 'ghz':
                        return '2 (maximal entanglement)';
                    case 'w':
                        return '2 (partial entanglement)';
                    case 'reset':
                        return '1 (no entanglement)';
                    default:
                        return 'Variable';
                }
            };

            // State creation methods (Next.js component methods)
            const createBellState = () => {
                const newCircuit = new Q5M.Circuit(2);
                setNumQubits(2);
                
                // Create Bell state: H(0) CNOT(0,1)
                newCircuit.h(0).cnot(0, 1);
                
                setCircuit(newCircuit);
                setCurrentState('bell');
                executeCircuit(newCircuit);
            };

            const createBellStateMinus = () => {
                const newCircuit = new Q5M.Circuit(2);
                setNumQubits(2);
                
                // Create Bell state with phase: X(0) H(0) CNOT(0,1)
                newCircuit.x(0).h(0).cnot(0, 1);
                
                setCircuit(newCircuit);
                setCurrentState('bell-');
                executeCircuit(newCircuit);
            };

            const createGHZState = () => {
                const newCircuit = new Q5M.Circuit(3);
                setNumQubits(3);
                
                // Create GHZ state: H(0) CNOT(0,1) CNOT(0,2)
                newCircuit.h(0).cnot(0, 1).cnot(0, 2);
                
                setCircuit(newCircuit);
                setCurrentState('ghz');
                executeCircuit(newCircuit);
            };

            const createWState = () => {
                const newCircuit = new Q5M.Circuit(3);
                setNumQubits(3);
                
                // Create W state approximation
                newCircuit
                    .ry(0, 2 * Math.acos(Math.sqrt(2/3)))
                    .cnot(0, 1)
                    .x(0)
                    .cnot(1, 2)
                    .cnot(0, 1);
                
                setCircuit(newCircuit);
                setCurrentState('w');
                executeCircuit(newCircuit);
            };

            const resetState = () => {
                const newCircuit = new Q5M.Circuit(3);
                setNumQubits(3);
                
                setCircuit(newCircuit);
                setCurrentState('reset');
                executeCircuit(newCircuit);
            };

            // Utility functions
            const formatComplex = (complex) => {
                if (!complex) return '0';
                
                const re = complex.re;
                const im = complex.im;
                
                if (Math.abs(im) < 0.001) {
                    return re.toFixed(3);
                }
                
                if (Math.abs(re) < 0.001) {
                    return `${im.toFixed(3)}i`;
                }
                
                const sign = im >= 0 ? '+' : '';
                return `${re.toFixed(3)}${sign}${im.toFixed(3)}i`;
            };

            // Initialize on mount (Next.js useEffect pattern)
            useEffect(() => {
                initCircuit();
            }, [initCircuit]);

            return (
                <div className="container">
                    <div className="header">
                        <h1>🔗 Quantum Entanglement with Next.js</h1>
                        <p>
                            Explore Bell states and GHZ states using Q5M.js
                            <span className="nextjs-badge">⚡ Next.js</span>
                        </p>
                    </div>

                    <div className="card">
                        <h3>🎯 Create Entangled States</h3>
                        <div className="controls">
                            <button onClick={createBellState} className={currentState === 'bell' ? 'active' : ''}>
                                Bell State |Φ⁺⟩
                            </button>
                            <button onClick={createBellStateMinus} className={currentState === 'bell-' ? 'active' : ''}>
                                Bell State |Φ⁻⟩
                            </button>
                            <button onClick={createGHZState} className={currentState === 'ghz' ? 'active' : ''}>
                                GHZ State (3 qubits)
                            </button>
                            <button onClick={createWState} className={currentState === 'w' ? 'active' : ''}>
                                W State (3 qubits)
                            </button>
                            <button onClick={resetState} className={currentState === 'reset' ? 'active' : ''}>
                                Reset |000⟩
                            </button>
                        </div>
                    </div>

                    <div className="state-display">
                        <div className="card">
                            <h3>📊 Measurement Probabilities</h3>
                            <div className="probabilities">
                                {probabilities.map((prob, index) => (
                                    <div key={index} className="probability-bar">
                                        <div className="bar" style={{height: `${prob * 200}px`}}></div>
                                        <div>|{index.toString(2).padStart(numQubits, '0')}⟩</div>
                                        <div>{(prob * 100).toFixed(1)}%</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="card">
                            <h3>🌊 Quantum Amplitudes</h3>
                            <div className="amplitude-display">
                                {amplitudes.map((amp, index) => (
                                    <div key={index} className="amplitude">
                                        <div>|{index.toString(2).padStart(numQubits, '0')}⟩</div>
                                        <div className="complex-num">
                                            {formatComplex(amp)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h3>ℹ️ State Information</h3>
                        <div className="state-info">
                            <div><strong>Current State:</strong> {getStateDescription()}</div>
                            <div><strong>Number of Qubits:</strong> {numQubits}</div>
                            <div><strong>Entanglement:</strong> {getEntanglementInfo()}</div>
                            <div><strong>Schmidt Rank:</strong> {getSchmidtRank()}</div>
                            <div><strong>Framework:</strong> Next.js (React 18 with Server Components support)</div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            return <EntanglementDemo />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
